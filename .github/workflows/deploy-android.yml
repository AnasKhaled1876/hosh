name: Deploy Android

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: android-production
    permissions:
      contents: read
    env:
      ANDROID_PACKAGE_NAME: com.hoosh.app
      IOS_BUNDLE_ID: com.hoosh.app
      APPLE_DEVELOPER_TEAM_ID: 2Q3YD93YN8
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Validate Android deploy secrets
        env:
          ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(ANDROID_SERVICE_ACCOUNT_JSON KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Decode Google Play service account
        env:
          ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          JSON_PATH="$RUNNER_TEMP/play-service-account.json"
          printf '%s' "$ANDROID_SERVICE_ACCOUNT_JSON" > "$JSON_PATH"
          echo "ANDROID_SERVICE_ACCOUNT_JSON_PATH=$JSON_PATH" >> "$GITHUB_ENV"

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Compute build number
        run: |
          set -euo pipefail
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))
          APP_VERSION_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          echo "APP_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> "$GITHUB_ENV"

      - name: Build Android App Bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          flutter build appbundle \
            --release \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_BUILD_NUMBER"
          echo "AAB_PATH=$GITHUB_WORKSPACE/build/app/outputs/bundle/release/app-release.aab" >> "$GITHUB_ENV"

      - name: Verify App Bundle signing
        run: |
          set -euo pipefail
          jarsigner -verify -verbose -certs "$AAB_PATH" > /dev/null

      - name: Generate release notes
        run: bash fastlane/gen_release_notes

      - name: Upload to Google Play
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bundle exec fastlane android a_rel

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/app-release.aab
            fastlane/metadata/android/en-US/changelogs/${{ env.APP_BUILD_NUMBER }}.txt
            fastlane/metadata/android/ar-EG/changelogs/${{ env.APP_BUILD_NUMBER }}.txt
